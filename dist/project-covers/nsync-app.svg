<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">NSync App cover</title>
  <desc id="desc">Logo cover for the NSync App project.</desc>
  <rect width="1200" height="700" fill="#ffffff"/>
  <rect x="0" y="0" width="1200" height="700" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="sGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2edc74"/>
      <stop offset="100%" stop-color="#1bbf61"/>
    </linearGradient>
  </defs>
  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="600" y="320" font-size="168" font-weight="800" fill="#101820" letter-spacing="-6">N</text>
    <text x="706" y="320" font-size="168" font-weight="800" fill="url(#sGreen)" letter-spacing="-6">S</text>
    <text x="812" y="320" font-size="168" font-weight="800" fill="#101820" letter-spacing="-6">ync</text>
    <text x="600" y="430" font-size="44" font-weight="400" fill="#4a4f56">Tenant workspace management</text>
  </g>
</svg>