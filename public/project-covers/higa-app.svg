<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Higa App cover</title>
  <desc id="desc">Brand cover for the Higa App project.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08131f"/>
      <stop offset="100%" stop-color="#0f2740"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7aa8ff"/>
      <stop offset="100%" stop-color="#72f6d1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <circle cx="172" cy="168" r="76" fill="none" stroke="url(#accent)" stroke-width="12" opacity="0.95"/>
  <circle cx="172" cy="168" r="28" fill="none" stroke="#72f6d1" stroke-width="10"/>
  <circle cx="172" cy="168" r="11" fill="#72f6d1"/>
  <g font-family="Arial, Helvetica, sans-serif" text-anchor="start">
    <text x="250" y="220" font-size="126" font-weight="800" fill="#f4f7fb" letter-spacing="-2">Higa</text>
    <text x="250" y="306" font-size="52" font-weight="600" fill="#a4adba">Mobile app experience</text>
  </g>
  <rect x="250" y="360" width="700" height="8" rx="4" fill="url(#accent)" opacity="0.9"/>
  <g font-family="Arial, Helvetica, sans-serif" fill="#dbe6f4" opacity="0.9">
    <text x="250" y="430" font-size="36" font-weight="500">Simple flows. Fast access. Practical everyday use.</text>
  </g>
</svg>