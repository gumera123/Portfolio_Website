<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">COT Inventory System cover</title>
  <desc id="desc">Logo cover for the COT Inventory System project.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eff4fa"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8aa0"/>
      <stop offset="100%" stop-color="#8a7dff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <g transform="translate(600 170)">
    <circle r="72" fill="none" stroke="url(#ring)" stroke-width="10"/>
    <circle r="58" fill="#ffffff" stroke="#d8e1ed" stroke-width="4"/>
    <path d="M-18 18h36M-14 18V-18M14 18V-18" stroke="#1b2430" stroke-width="6" stroke-linecap="round"/>
    <circle cx="-26" cy="-8" r="8" fill="#1b2430"/>
    <circle cx="26" cy="-8" r="8" fill="#1b2430"/>
    <path d="M-26 6C-12 26 12 26 26 6" fill="none" stroke="#1b2430" stroke-width="5" stroke-linecap="round"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="600" y="332" font-size="50" font-weight="800" fill="#68768a" letter-spacing="8">C O T</text>
    <text x="600" y="396" font-size="44" font-weight="700" fill="#4066a7" letter-spacing="3">INVENTORY SYSTEM</text>
    <text x="600" y="452" font-size="28" font-weight="500" fill="#4f647f">Secure access to your inventory workspace</text>
  </g>
</svg>